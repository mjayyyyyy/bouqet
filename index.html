<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful digital bouquet gift for Mheg from Marvin - Happy Monthsary">
    <title>💐 For You, Mheg 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <!-- html2canvas loaded via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating petals container -->
    <div id="petals-container"></div>
    <div id="sparkles-container"></div>

    <!-- Capture Wrapper -->
    <div id="gift-page-wrapper">
        <div class="meadow-bg"></div>

        <div class="main-layout">
            <!-- Bouquet Section -->
            <div class="bouquet-section">
                <div class="glow-ring"></div>
                <div class="bouquet-container">
                    <img src="bouquet.jpg" alt="A beautiful digital bouquet of flowers" class="bouquet-image" id="bouquet-img-el">
                </div>
            </div>

            <!-- Card Section -->
            <div class="card-section">
                <div class="gift-card" id="gift-card">
                    <div class="card-decoration"></div>
                    <div class="card-inner">
                        <!-- Top Header -->
                        <div class="card-header">
                            <span class="card-flower-left">🌸</span>
                            <span class="card-title-icon">💐</span>
                            <span class="card-flower-right">🌸</span>
                        </div>

                        <!-- TO is at the top -->
                        <div class="card-to-section">
                            <span class="card-label">To:</span>
                            <span class="card-value card-to">Mheg</span>
                        </div>

                        <div class="card-divider">
                            <span>✿</span><span>✿</span><span>✿</span>
                        </div>

                        <!-- Message block in the middle -->
                        <div class="card-message">
                            <p class="card-occasion">Happy Monthsary <span class="heart-text">&lt;3</span></p>
                            <p class="card-body-text">Another month down, forever more to go.</p>
                            <p class="card-closing">I love you to the moon and back.</p>
                        </div>

                        <div class="card-divider">
                            <span>✿</span><span>✿</span><span>✿</span>
                        </div>

                        <!-- FROM is at the bottom -->
                        <div class="card-from-section">
                            <span class="card-label">From:</span>
                            <span class="card-value card-from">Marvin</span>
                        </div>

                        <div class="card-hearts">
                            <span>💕</span><span>🌙</span><span>💕</span>
                        </div>
                    </div>
                    <div class="card-decoration"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Save Button -->
    <button class="save-btn" id="save-btn">
        <span class="btn-icon">📸</span>
        <span class="btn-text">Save Page Image</span>
    </button>

    <script src="script.js"></script>
</body>
</html>
